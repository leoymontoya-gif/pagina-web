<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Espacio de Ciberseguridad</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
        }
        p {
            color: #8b949e;
            font-size: 1.1rem;
        }
        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Hola Amigos de  GitHub 🚀</h1>
        <p>Esta es mi primera página web oficial en internet.</p>
        <button onclick="saludar()">¡Haz clic aquí!</button>
    </div>

    <script>
        function saludar() {
            alert("¡Felicidades! Tu página web interactiva está funcionando perfectamente.");
        }
    </script>

</body>
</html>
